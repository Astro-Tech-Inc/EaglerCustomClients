<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaglerCustomClients</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0d0d0d;
      color: #f2f2f2;
    }

    header {
      width: 100%;
      padding: 22px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
    }

    .repo {
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }

    .repo:hover {
      color: #fff;
    }

    main {
      max-width: 1050px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .hero {
      margin-bottom: 45px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(38px, 7vw, 72px);
      letter-spacing: -3px;
      line-height: 0.95;
    }

    .subtitle {
      color: #999;
      font-size: 17px;
      margin: 0;
    }

    .controls {
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      max-width: 360px;
      background: #151515;
      border: 1px solid #2b2b2b;
      color: #fff;
      padding: 13px 15px;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
    }

    input:focus {
      border-color: #555;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 16px;
    }

    .card {
      background: #151515;
      border: 1px solid #252525;
      border-radius: 16px;
      padding: 20px;
      min-height: 170px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: 0.15s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #444;
      background: #181818;
    }

    .card h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.5px;
    }

    .version {
      color: #888;
      margin-top: 8px;
      font-size: 14px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 28px;
    }

    .button {
      flex: 1;
      text-align: center;
      padding: 11px 12px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      border: 1px solid #333;
      color: #eee;
      background: #1d1d1d;
    }

    .button:hover {
      background: #242424;
      border-color: #555;
    }

    .button.primary {
      background: #f2f2f2;
      color: #0d0d0d;
      border-color: #f2f2f2;
    }

    .button.primary:hover {
      background: #dcdcdc;
    }

    .empty {
      color: #888;
      border: 1px solid #252525;
      background: #151515;
      border-radius: 16px;
      padding: 20px;
      display: none;
    }

    footer {
      max-width: 1050px;
      margin: 0 auto;
      padding: 25px 20px 45px;
      color: #777;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      header {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }

      main {
        padding-top: 45px;
      }

      h1 {
        letter-spacing: -2px;
      }
    }
  </style>
</head>

<body>
  <header>
    <a class="logo" href="./">EaglerCustomClients</a>
    <a class="repo" href="https://github.com/Astro-Tech-Inc/EaglerCustomClients" target="_blank" rel="noopener">
      GitHub
    </a>
  </header>

  <main>
    <section class="hero">
      <h1>EaglerCustomClients</h1>
      <p class="subtitle">Custom Eaglercraft clients.</p>
    </section>

    <section class="controls">
      <input id="search" type="text" placeholder="Search clients" />
    </section>

    <section class="grid" id="clientGrid"></section>

    <div class="empty" id="emptyMessage">
      No clients found.
    </div>
  </main>

  <footer>
    EaglerCustomClients
  </footer>

  <script>
    const clients = [
      {
        name: "Astra Client",
        version: "Client",
        path: "AstraClient"
      },
      {
        name: "Astra Client 2",
        version: "Client",
        path: "Astra2"
      },
      {
        name: "Pixel Client",
        version: "Client",
        path: "PixelClient"
      },
      {
        name: "Resent Client",
        version: "Client",
        path: "ResentClient"
      },
      {
        name: "Tuff Client",
        version: "Client",
        path: "TuffClient"
      }
    ];

    const grid = document.getElementById("clientGrid");
    const search = document.getElementById("search");
    const emptyMessage = document.getElementById("emptyMessage");

    function renderClients(query = "") {
      grid.innerHTML = "";

      const filtered = clients.filter(client =>
        client.name.toLowerCase().includes(query.toLowerCase())
      );

      emptyMessage.style.display = filtered.length ? "none" : "block";

      filtered.forEach(client => {
        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
          <div>
            <h2>${client.name}</h2>
            <div class="version">${client.version}</div>
          </div>

          <div class="buttons">
            <a class="button primary" href="./${client.path}/">Launch</a>
            <a class="button" href="https://github.com/Astro-Tech-Inc/EaglerCustomClients/tree/main/${client.path}" target="_blank" rel="noopener">Files</a>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    search.addEventListener("input", () => {
      renderClients(search.value);
    });

    renderClients();
  </script>
</body>
</html>
