<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaglerCustomClients</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #101010;
      color: #f1f1f1;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      border-bottom: 1px solid #2a2a2a;
      padding: 18px 20px;
    }

    .header-inner {
      max-width: 950px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      text-decoration: none;
    }

    .github {
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }

    .github:hover {
      color: #fff;
    }

    main {
      max-width: 950px;
      margin: 0 auto;
      padding: 45px 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 42px;
      letter-spacing: -1.5px;
    }

    .sub {
      margin: 0 0 30px;
      color: #999;
      font-size: 16px;
    }

    .search {
      width: 100%;
      max-width: 340px;
      margin-bottom: 22px;
      padding: 12px 14px;
      background: #171717;
      border: 1px solid #333;
      border-radius: 7px;
      color: #fff;
      outline: none;
      font-size: 15px;
    }

    .search:focus {
      border-color: #666;
    }

    .clients {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 14px;
    }

    .client {
      background: #171717;
      border: 1px solid #292929;
      border-radius: 10px;
      padding: 17px;
    }

    .client:hover {
      border-color: #4a4a4a;
      background: #1b1b1b;
    }

    .client-name {
      font-size: 19px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .client-path {
      color: #888;
      font-size: 13px;
      margin-bottom: 18px;
      word-break: break-word;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    .button {
      flex: 1;
      text-align: center;
      text-decoration: none;
      padding: 10px;
      border-radius: 7px;
      font-size: 14px;
      font-weight: bold;
      background: #242424;
      color: #eee;
      border: 1px solid #363636;
    }

    .button:hover {
      background: #2d2d2d;
      border-color: #555;
    }

    .button.launch {
      background: #f1f1f1;
      color: #101010;
      border-color: #f1f1f1;
    }

    .button.launch:hover {
      background: #dcdcdc;
    }

    .empty {
      display: none;
      color: #888;
      background: #171717;
      border: 1px solid #292929;
      border-radius: 10px;
      padding: 17px;
    }

    footer {
      max-width: 950px;
      margin: 0 auto;
      padding: 0 20px 35px;
      color: #777;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <a class="title" href="./">EaglerCustomClients</a>
      <a class="github" href="https://github.com/Astro-Tech-Inc/EaglerCustomClients" target="_blank" rel="noopener">GitHub</a>
    </div>
  </header>

  <main>
    <h1>EaglerCustomClients</h1>
    <p class="sub">Custom Eaglercraft clients</p>

    <input class="search" id="search" type="text" placeholder="Search clients" />

    <section class="clients" id="clients"></section>

    <div class="empty" id="empty">No clients found.</div>
  </main>

  <footer>
    EaglerCustomClients
  </footer>

  <script>
    const clients = [
      { name: "Aero Client", path: "AeroClient" },
      { name: "Astra Client 2", path: "Astra2" },
      { name: "Astra Client", path: "AstraClient" },
      { name: "DragonX Client", path: "DragonXClient" },
      { name: "Flame Client", path: "FlameClient" },
      { name: "Kone Client", path: "KoneClient" },
      { name: "Pi Client", path: "PiClient" },
      { name: "Pixel Client", path: "PixelClient" },
      { name: "Resent Client", path: "ResentClient" },
      { name: "Shadow Client", path: "ShadowClient" },
      { name: "Starlike Client", path: "StarlikeClient" },
      { name: "Tuff Client", path: "TuffClient" },
      { name: "Uwu Client", path: "UwuClient" }
    ];

    const clientsBox = document.getElementById("clients");
    const search = document.getElementById("search");
    const empty = document.getElementById("empty");

    function renderClients() {
      const query = search.value.toLowerCase().trim();

      const filtered = clients.filter(client =>
        client.name.toLowerCase().includes(query) ||
        client.path.toLowerCase().includes(query)
      );

      clientsBox.innerHTML = "";
      empty.style.display = filtered.length ? "none" : "block";

      filtered.forEach(client => {
        const card = document.createElement("div");
        card.className = "client";

        card.innerHTML = `
          <div class="client-name">${client.name}</div>
          <div class="client-path">${client.path}</div>

          <div class="buttons">
            <a class="button launch" href="./${client.path}/">Launch</a>
            <a class="button" href="https://github.com/Astro-Tech-Inc/EaglerCustomClients/tree/main/${client.path}" target="_blank" rel="noopener">Files</a>
          </div>
        `;

        clientsBox.appendChild(card);
      });
    }

    search.addEventListener("input", renderClients);
    renderClients();
  </script>
</body>
</html>
